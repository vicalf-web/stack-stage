<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge Técnico - Java</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #2d3436; padding: 40px 20px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        #timer-sticky { position: fixed; top: 20px; right: 20px; background: #1a1a1a; color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; font-family: monospace; z-index: 1000; }
        .question { margin-bottom: 35px; padding: 25px; border-radius: 10px; background: #ffffff; border: 1px solid #edf2f7; }
        .question p { font-weight: 600; font-size: 1.15rem; margin-top: 0; color: #2d3748; }
        label { display: block; margin-bottom: 12px; cursor: pointer; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc; }
        label:hover { border-color: #4a5568; background: #edf2f7; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); }
        button { background: #1a1a1a; color: white; border: none; padding: 18px 50px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; }
        #thanks-box { display: none; text-align: center; padding: 40px; }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

<div id="timer-sticky">Tiempo: <span id="time">15:00</span></div>

<div class="container" id="main-container">
    <!-- Formulario oculto conectado a Formspree -->
<form id="hiddenRecruiterForm" action="https://formspree.io/f/mzdlzyab" method="POST" style="display:none;">        <input type="text" name="Candidato" id="form_nombre">
        <input type="email" name="Email" id="form_email">
        <input type="text" name="Tecnologia_Evaluada" id="form_tech">
        <input type="text" name="Puntaje" id="form_score">
        <input type="text" name="Seniority_Calculado" id="form_seniority">
        <input type="text" name="Respuestas" id="form_details">
    </form>

    <h1 id="exam-title">Cargando Examen...</h1>
    <form id="quizForm">
        <div id="questions-container"></div>
        <div style="text-align:center; margin-top: 50px;">
            <button type="button" id="submitBtn" onclick="processAndSend(false)">Finalizar Test</button>
        </div>
    </form>
</div>

<div class="container" id="thanks-box">
    <h2>¡Evaluación Finalizada!</h2>
    <p style="color: #4a5568; font-size: 1.1rem;">Tus respuestas han sido registradas de manera segura.</p>
    <p style="color: #718096;">El equipo de Recruiting revisará tu perfil y se pondrá en contacto contigo a la brevedad.</p>
</div>

<script>
    // Banco de Preguntas Completo de Java (Jr, Ssr y Sr)
    const examDatabase = {
        java_jr: {
            title: "Java Developer - Junior Assessment",
            keys: { q1:"B", q2:"B", q3:"B", q4:"B", q5:"B", q6:"A", q7:"B", q8:"B", q9:"B", q10:"A" },
            questions: [
                { p: "1. ¿Cuál es la principal ventaja de que Java sea un lenguaje que corre sobre la JVM?", a: "Que el código se ejecuta más rápido que en C++.", b: "La portabilidad: 'Escribe una vez, ejecuta en cualquier lugar'.", c: "Que no permite cometer errores de memoria." },
                { p: "2. ¿Qué diferencia principal hay entre tipos primitivos (int) y Wrappers (Integer)?", a: "Los primitivos pueden almacenar decimales y los wrappers no.", b: "Los Wrappers son objetos, pueden ser null y tienen métodos; los primitivos no.", c: "No hay diferencia, se usan exactamente igual." },
                { p: "3. ¿Para qué sirve la palabra clave 'static' en Java?", a: "Significa que la variable nunca va a cambiar su valor (constante).", b: "Significa que pertenece a la clase en sí, y no a una instancia específica.", c: "Hace que el código sea privado y oculto." },
                { p: "4. ¿Qué ocurre si intentamos acceder a un método de un objeto que tiene valor 'null'?", a: "El programa ignora la línea y continúa seguro.", b: "Se produce un error en tiempo de ejecución NullPointerException.", c: "El compilador detecta el error y no te deja ejecutar." },
                { p: "5. ¿Qué palabra clave se utiliza para que una clase herede los atributos de una clase padre?", a: "implements", b: "extends", c: "instanceof" },
                { p: "6. ¿Cuál es la diferencia básica entre usar un ciclo while y un ciclo do-while?", a: "El do-while garantiza que el bloque de código se ejecutará al menos una vez.", b: "El ciclo while es infinitamente más rápido.", c: "While es para números y do-while para textos." },
                { p: "7. ¿Para qué se utiliza el bloque 'finally' en una estructura try-catch?", a: "Para atrapar únicamente los errores más graves.", b: "Para ejecutar código obligatorio sin importar si ocurrió un error o no.", c: "Para finalizar el programa de manera abrupta si algo sale mal." },
                { p: "8. ¿Qué estructura utilizarías si necesitas almacenar elementos sin duplicados?", a: "ArrayList", b: "HashSet (o cualquier implementación de Set)", c: "HashMap" },
                { p: "9. ¿Qué comando de consola se usa para compilar un archivo fuente de Java (.java)?", a: "java Main.java", b: "javac Main.java", c: "compile Main.java" },
                { p: "10. ¿Qué significa que una clase o método tenga el modificador de acceso 'private'?", a: "Que solo puede ser accedido desde dentro de la misma clase.", b: "Que solo empresas con licencia pueden usarlo.", c: "Que el método solo es visible para el mismo paquete." }
            ]
        },
        java_ssr: {
            title: "Java Developer - Semi-Senior Assessment",
            keys: { q1:"B", q2:"B", q3:"A", q4:"B", q5:"B", q6:"B", q7:"B", q8:"A", q9:"B", q10:"B" },
            questions: [
                { p: "1. ¿Qué es el 'Garbage Collector' en Java?", a: "Un proceso que destruye archivos class antiguos.", b: "Un sistema automático que libera memoria destruyendo objetos sin referencias activas.", c: "Una función que debes invocar manualmente con System.gc()." },
                { p: "2. En Java 8+, ¿qué beneficio aporta el uso de la clase Optional?", a: "Permite que el código corra de forma asíncrona.", b: "Ayuda a modelar valores ausentes, reduciendo NullPointerExceptions.", c: "Sirve para compactar colecciones de datos masivas." },
                { p: "3. ¿Cuál es la diferencia entre las interfaces List y Set?", a: "List mantiene orden y permite duplicados; Set prohíbe duplicados.", b: "List solo almacena Strings y Set cualquier objeto.", c: "Set es significativamente más lento que List." },
                { p: "4. ¿Qué diferencia existe entre una excepción Checked y una Unchecked?", a: "Checked ocurre al compilar y Unchecked en servidores Linux.", b: "Checked obliga al desarrollador a manejarla; Unchecked no lo requiere obligatoriamente.", c: "Unchecked detiene la computadora de inmediato." },
                { p: "5. Para concatenar texto dentro de un bucle repetido miles de veces, ¿cuál es la mejor práctica?", a: "Usar el operador tradicional +.", b: "Utilizar la clase StringBuilder para evitar objetos inmutables redundantes.", c: "Utilizar un arreglo de caracteres estático primitivo." },
                { p: "6. ¿Qué es la 'Inyección de Dependencias' común en frameworks como Spring?", a: "Una técnica para clonar objetos sin usar memoria RAM.", b: "Un patrón de diseño que delega la creación de objetos a un contenedor externo.", c: "Un virus informático que afecta a aplicaciones en la nube." },
                { p: "7. ¿Qué funcionalidad de rendimiento prove la API de Streams en Java?", a: "Permite transmitir audio y video en tiempo real.", b: "Facilita el procesamiento de datos de forma declarativa/funcional (filtros, mapeos).", c: "Sirve exclusivamente para encriptar contraseñas." },
                { p: "8. ¿Para qué sirve la anotación @Override?", a: "Valida que un método esté sobrescribiendo correctamente un método padre.", b: "Aumenta el rendimiento del método un 20% en producción.", c: "Convierte automáticamente una clase en una base de datos local." },
                { p: "9. ¿Cuál es la diferencia entre el método equals() y el operador ==?", a: "El operador == compara referencias de memoria; equals() evalúa igualdad conceptual.", b: "El operador == compara el contenido y equals() compara si usan las mismas variables.", c: "No hay diferencia; ambos realizan la misma operación." },
                { p: "10. Al trabajar con hilos, ¿qué hace la palabra clave 'synchronized' en un método?", a: "Hace que el método corra en la nube en tiempo real.", b: "Garantiza que solo un hilo pueda acceder al método a la vez, evitando conflictos.", c: "Obliga al programa a borrar la memoria caché de la JVM." }
            ]
        },
        java_sr: {
            title: "Java Developer - Senior Assessment",
            keys: { q1:"B", q2:"B", q3:"A", q4:"B", q5:"B", q6:"B", q7:"B", q8:"B", q9:"B", q10:"B" },
            questions: [
                { p: "1. ¿Cómo puede ocurrir una fuga de memoria (Memory Leak) en Java a pesar del Garbage Collector?", a: "Cuando el disco duro se queda sin espacio de logs.", b: "Cuando objetos innecesarios siguen referenciados activamente (ej. colecciones estáticas).", c: "Es un defecto físico de los chips de memoria RAM." },
                { p: "2. ¿Cuál es el beneficio de usar clases del paquete java.util.concurrent.atomic?", a: "Evitan por completo el uso de memoria caché en procesadores multihilo.", b: "Utilizan operaciones directas del procesador libres de bloqueos (lock-free), ofreciendo mayor rendimiento.", c: "Duplican la velocidad de los hilos al cambiar números a texto." },
                { p: "3. ¿Qué problema resuelve el patrón 'Factory' y cuándo deberías evitarlo?", a: "Centraliza la creación de objetos complejos; se evita si las clases son simples por sobreingeniería.", b: "Reemplaza el uso de bases de datos relacionales; se evita en NoSQL.", c: "Permite enviar datos encriptados por red; se evita sin SSL." },
                { p: "4. ¿Qué es el 'ClassLoader' en Java?", a: "Un componente que elimina el código muerto.", b: "Un subsistema de la JVM encargado de cargar dinámicamente archivos de clases en memoria.", c: "Una herramienta visual para diseñar interfaces en Spring." },
                { p: "5. En microservicios, ¿para qué sirve implementar el patrón 'Circuit Breaker'?", a: "Para apagar servidores si el consumo eléctrico supera el límite.", b: "Para evitar fallos en cadena, aislando un servicio caído y respondiendo con datos alternativos.", c: "Para encriptar de extremo a extremo datos sensibles." },
                { p: "6. ¿Qué implicación estructural tiene marcar una clase como 'final' en Java?", a: "Provoca que la clase ocupe la mitad de memoria pero borra métodos.", b: "Impide que la clase sea heredada, protegiendo la inmutabilidad de la arquitectura.", c: "Hace que la clase solo pueda ejecutarse una vez por día." },
                { p: "7. En un pool de conexiones (HikariCP), ¿qué provoca un tamaño de pool excesivamente grande?", a: "Caídas porque las queries se vuelven alfabéticas.", b: "Agotamiento de memoria en la DB y alto costo por Context Switching en el servidor.", c: "Que los datos comiencen a duplicarse al azar." },
                { p: "8. ¿Cómo afecta el uso excesivo de 'Java Reflection' en producción?", a: "Mejora la seguridad pero deshabilita internet.", b: "Degrada el rendimiento debido a validación dinámica en ejecución y rompe el encapsulamiento.", c: "Cambia el diseño visual de la interfaz de manera impredecible." },
                { p: "9. En arquitecturas de eventos, ¿qué estrategia mitiga el consumo de mensajes duplicados?", a: "Configurar la base de datos para borrar registros al azar cada hora.", b: "Diseñar consumidores independientes con validación de ID único de mensaje (Idempotencia).", c: "Desactivar el procesado multihilo en todos los servidores." },
                { p: "10. ¿Cuál es la diferencia técnica entre los recolectores de basura G1 y ZGC?", a: "G1 es para web y ZGC para bases de datos relacionales.", b: "ZGC gestiona heaps masivos con pausas menores a un milisegundo, siendo más escalable que G1.", c: "G1 detiene el servidor por horas y ZGC no consume memoria RAM." }
            ]
        }
    };

    // Detectar qué examen renderizar basándose en lo que guardó el menú principal
    const currentLevel = localStorage.getItem('nivel_elegido') || 'java_jr';
    const examData = examDatabase[currentLevel];
    
    document.getElementById('exam-title').innerText = examData.title;
    const container = document.getElementById('questions-container');
    
    // Dibujar las preguntas dinámicamente en la pantalla
    examData.questions.forEach((item, index) => {
        const i = index + 1;
        container.innerHTML += `
            <div class="question">
                <p>${item.p}</p>
                <label><input type="radio" name="q${i}" value="A"> A) ${item.a}</label>
                <label><input type="radio" name="q${i}" value="B"> B) ${item.b}</label>
                <label><input type="radio" name="q${i}" value="C"> C) ${item.c}</label>
            </div>
        `;
    });

    // Temporizador (15 minutos)
    let timeLimit = 15 * 60;
    const timerDisplay = document.getElementById('time');
    const timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLimit / 60);
        let seconds = timeLimit % 60;
        timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLimit <= 0) { clearInterval(timerInterval); processAndSend(true); }
        timeLimit--;
    }, 1000);

    function processAndSend(isAuto) {
        clearInterval(timerInterval);
        let score = 0;
        let details = [];

        for (let i = 1; i <= 10; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected && !isAuto) { alert("Por favor responde todas las preguntas."); return; }
            let val = selected ? selected.value : "X";
            details.push(`P${i}:${val}`);
            if (val === examData.keys[`q${i}`]) score++;
        }

        let seniority = "Junior (Jr)";
        if (score >= 9) seniority = "Senior (Sr)";
        else if (score >= 6) seniority = "Semi-Senior (Ssr)";

        // Bloqueo definitivo en este navegador para evitar reintentos
        localStorage.setItem('test_realizado', 'true');

        // Llenar el formulario invisible para Formspree
        document.getElementById('form_nombre').value = localStorage.getItem('candidato_nombre');
        document.getElementById('form_email').value = localStorage.getItem('candidato_email');
        document.getElementById('form_tech').value = examData.title;
        document.getElementById('form_score').value = `${score} / 10`;
        document.getElementById('form_seniority').value = seniority;
        document.getElementById('form_details').value = details.join(", ");

        // Ocultar examen y mostrar pantalla de éxito limpia
        document.getElementById('timer-sticky').style.display = "none";
        document.getElementById('main-container').style.display = "none";
        document.getElementById('thanks-box').style.display = "block";

        // Enviar silenciosamente el email a tu casilla
        document.getElementById('hiddenRecruiterForm').submit();
    }
</script>
</body>
</html>
