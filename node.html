                { id: 8, p: "8. Al realizar profiling profundo de memoria en Node.js usando un Heap Snapshot, ¿cuál es la diferencia crítica entre el tamaño de objeto conocido como 'Shallow Size' y 'Retained Size'?", a: "Shallow Size incluye las bases de datos externas asociadas; Retained Size mide los archivos de logs locales.", b: "Shallow Size es el tamaño físico de la memoria que ocupa el propio objeto de forma aislada; Retained Size es el tamaño de memoria que se liberaría de forma acumulada si dicho objeto fuera destruido por el Garbage Collector.", c: "Son sinónimos idénticos determinados por el motor criptográfico de NodeJS de producción.", correct: "B" },
                { id: 9, p: "9. ¿Qué ventaja técnica avanzada aporta configurar la directiva 'expose-gc' en la ejecución de Node.js en entornos de testing automatizado de integración continua?", a: "Permite saltearse las reglas de firewalls de red para acelerar las llamadas API externas.", b: "Expone de forma explícita el método global gc(), permitiendo disparar de forma controlada y programada la recolección de basura para medir y diagnosticar con total precisión la existencia de fugas de memoria en las pruebas.", c: "Deshabilita por completo el Virtual DOM de los microfrontends locales.", correct: "B" },
                { id: 10, p: "10. ¿Cuál es el peligro de seguridad y estabilidad de no manejar el evento 'unhandledRejection' de forma global en procesos corporativos de Node.js?", a: "Que el compilador de TypeScript rechace compilar las clases abstractas del backend.", b: "Provoca que excepciones asíncronas no capturadas dejen a la aplicación en un estado inconsistente o silencioso de degradación; las últimas versiones de Node fuerzan el fin del proceso con un código de error fatal por estabilidad.", c: "Ninguno, Node maneja y encapsula de forma silenciosa e infalible cualquier error asíncrono sin afectar los hilos.", correct: "B" },
                { id: 11, p: "11. En una arquitectura de NestJS de alta disponibilidad, ¿cuál es la diferencia operativa estricta en el ciclo de vida del framework entre un Interceptor y un Exception Filter?", a: "El Exception Filter se ejecuta únicamente si la base de datos relacional se desconecta.", b: "El Interceptor intercepta y muta el flujo de peticiones/respuestas exitosas antes y después de llegar al handler; el Exception Filter captura de forma unificada las excepciones no controladas para sanitizar la salida.", c: "El Interceptor deshabilita las inyecciones de dependencias de la clase de servicios.", correct: "B" },
                { id: 12, p: "12. ¿Cómo afecta la configuración de la bandera '--max-old-space-size' a nivel de infraestructura de contenedores (Docker/Kubernetes) al desplegar servicios Node.js?", a: "Configura el límite de conexiones concurrentes TCP que el servidor Express puede aceptar antes de colapsar.", b: "Define explíclitamente el límite máximo de memoria RAM que la JVM de V8 puede asignar al Old Space antes de disparar un crash por OutOfMemoryError, debiendo alinearse con los límites del contenedor.", c: "Controla de manera automática el tamaño físico de los archivos de logs guardados en el disco local.", correct: "B" },
                { id: 13, p: "13. Si necesitas implementar un patrón de streaming bidireccional de baja latencia con alta concurrencia para canales electrónicos avanzados, ¿qué consideraciones de arquitectura debes prever al elegir WebSockets sobre HTTP/2 Server-Sent Events (SSE)?", a: "WebSockets requiere obligatoriamente que todas las tablas de base de datos sean documentales NoSQL.", b: "WebSockets maneja una conexión TCP dúplex completa ideal para flujos bidireccionales intensivos, pero introduce sobrecarga de gestión de estado de sesiones; SSE es óptimo y liviano si la comunicación es puramente unidireccional del servidor al cliente.", c: "SSE no soporta el transporte de tokens de autenticación cifrados en la cabecera.", correct: "B" },
                { id: 14, p: "14. Al configurar el mecanismo de balanceo de carga interno del módulo cluster de Node.js en entornos de servidores Linux, ¿qué algoritmo maneja por defecto el sistema operativo para distribuir las conexiones entre los workers?", a: "Least Connections con pesos dinámicos configurables.", b: "Algoritmo Round-Robin, donde el proceso maestro escucha el puerto y distribuye las conexiones entrantes de forma equitativa y asíncrona evitando la saturación de los hilos hijos.", c: "Distribución aleatoria basada en hashing criptográfico de la dirección IP de origen.", correct: "B" },
                { id: 15, p: "15. ¿Qué estrategia de mitigación técnica aplicarías en Node.js ante una vulnerabilidad de ataque por prototipo (Prototype Pollution)?", a: "Convertir todas las variables de los payloads a strings planos cifrados base64 de manera manual.", b: "Utilizar objetos planos creados mediante Object.create(null) para diccionarios dinámicos, congelar prototipos críticos con Object.freeze(), o aplicar esquemas estrictos de validación con librerías como Joi o Pydantic/Zod.", c: "Deshabilitar las capacidades de inyección de dependencias modulares del framework web.", correct: "B" },
                { id: 16, p: "16. Trabajando con microservicios en Node.js, ¿por qué el uso de Transportadores orientados a gRPC (HTTP/2) aventaja drásticamente al esquema clásico de comunicación síncrona REST (HTTP/1.1) entre servicios internos?", a: "gRPC elimina la necesidad de realizar pruebas unitarias automatizadas de integración continua.", b: "gRPC utiliza multiplexación sobre conexiones persistentes únicas de HTTP/2 y serialización eficiente binaria con Protocol Buffers, reduciendo drásticamente la latencia, el ancho de banda y la sobrecarga de CPU.", c: "REST es exclusivo para servidores de base de datos relacionales locales de tipo Microsoft SQL Server.", correct: "B" },
                { id: 17, p: "17. Al implementar pruebas de carga (Load Testing) sobre una API REST construida con NestJS utilizando herramientas como Artillery o K6, ¿qué métrica técnica de infraestructura te indica de forma inequívoca que la app está sufriendo contención de Event Loop?", a: "Un incremento lineal en el tamaño de los artefactos compilados del bundle en disco.", b: "Un aumento drástico en la métrica Event Loop Delay o latencia de p99 en las respuestas simultáneo a un bajo consumo general de los múltiples cores de CPU disponibles.", c: "La recarga forzada e involuntaria del LocalStorage de los clientes conectados.", correct: "B" },
                { id: 18, p: "18. Utilizando la librería nativa 'crypto' para firmar digitalmente payloads financieros, ¿por qué es mandatorio preferir métodos asíncronos (como crypto.pbkdf2) en lugar de sus equivalentes síncronos dentro del backend?", a: "Los equivalentes síncronos modifican de forma irreversible los esquemas de bases de datos locales.", b: "Los métodos síncronos bloquean de forma completa el Event Loop único durante el costoso procesamiento matemático de cifrado de la CPU, congelando el servicio web; los asíncronos delegan la tarea a la pool de hilos de Libuv.", c: "Los asíncronos son los únicos compatibles con tokens JWT asimétricos firmados.", correct: "B" },
                { id: 19, p: "19. ¿Cuál es el impacto arquitectónico y funcional de adoptar EcmaScript Modules (ESM con 'import/export') de forma nativa sobre el esquema clásico de CommonJS ('require') en proyectos Node.js modernos?", a: "ESM inhabilita la posibilidad de estructurar arquitecturas modulares o utilizar TypeScript.", b: "ESM introduce carga estática asíncrona de módulos que permite análisis en tiempo de compilación previa, facilitando optimizaciones agresivas de Tree-Shaking y unificación estricta del estándar con el navegador.", c: "CommonJS consume el doble de memoria RAM física debido a algoritmos síncronos obligatorios de búsqueda en disco.", correct: "B" },
                { id: 20, p: "20. Diseñando un componente de pasarela de red (API Gateway) corporativo con Node.js, ¿cómo previene el arquitecto ataques por fuerza bruta o denegación de servicio a nivel de capa de aplicación (Layer 7)?", a: "Configurando scripts manuales que limpien las variables de sesión del servidor web de manera cíclica.", b: "Implementando middlewares estrictos de Rate Limiting apoyados en un almacén en memoria rápido y centralizado como Redis (utilizando algoritmos de Token Bucket o Leaky Bucket) para bloquear peticiones abusivas por IP.", c: "Deshabilitando de manera unilateral las capacidades de enrutamiento dinámico de las rutas de Express.", correct: "B" }
            ]
        }

    function getRandomQuestions(bank, count) {
        let shuffled = [...bank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    const currentLevel = localStorage.getItem('nivel_elegido') || 'node_jr';
    const examData = examDatabase[currentLevel];
    
    document.getElementById('exam-title').innerText = examData.title;
    const container = document.getElementById('questions-container');
    
    const selectedQuestions = getRandomQuestions(examData.questions, 10);
    
    selectedQuestions.forEach((item, index) => {
        const visualIndex = index + 1;
        const cleanText = item.p.replace(/^\d+\.\s*/, '');
        
        container.innerHTML += `
            <div class="question" data-id="${item.id}" data-correct="${item.correct}">
                <p>${visualIndex}. ${cleanText}</p>
                <label><input type="radio" name="q${item.id}" value="A"> A) ${item.a}</label>
                <label><input type="radio" name="q${item.id}" value="B"> B) ${item.b}</label>
                <label><input type="radio" name="q${item.id}" value="C"> C) ${item.c}</label>
            </div>
        `;
    });

    let timeLimit = 15 * 60;
    const timerDisplay = document.getElementById('time');
    const timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLimit / 60);
        let seconds = timeLimit % 60;
        timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLimit <= 0) { clearInterval(timerInterval); processAndSend(true); }
        timeLimit--;
    }, 1000);

    function processAndSend(isAuto) {
        clearInterval(timerInterval);
        let score = 0;
        let details = [];
        let unanswered = false;

        selectedQuestions.forEach((item) => {
            const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
            if (!selected && !isAuto) { unanswered = true; }
            
            let val = selected ? selected.value : "X";
            details.push(`PreguntaID_${item.id}:${val}`);
            if (val === item.correct) score++;
        });

        if (unanswered && !isAuto) { 
            alert("Por favor responde todas las preguntas antes de finalizar."); 
            return; 
        }

        let seniority = "Junior (Jr)";
        if (score >= 9) seniority = "Senior (Sr)";
        else if (score >= 6) seniority = "Semi-Senior (Ssr)";

        localStorage.setItem('test_realizado', 'true');

        document.getElementById('form_nombre').value = localStorage.getItem('candidato_nombre');
        document.getElementById('form_email').value = localStorage.getItem('candidato_email');
        document.getElementById('form_tech').value = examData.title;
        document.getElementById('form_score').value = `${score} / 10`;
        document.getElementById('form_seniority').value = seniority;
        document.getElementById('form_details').value = details.join(", ");
        document.getElementById('form_reclutadora').value = localStorage.getItem('reclutadora_asignada');

        document.getElementById('timer-sticky').style.display = "none";
        document.getElementById('main-container').style.display = "none";
        document.getElementById('thanks-box').style.display = "block";

        document.getElementById('hiddenRecruiterForm').submit();
    }
</script>
