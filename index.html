<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Evaluaciones Técnicas</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #2d3436; padding: 40px 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a1a1a; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568; }
        input[type="text"], input[type="email"], select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: #1a1a1a; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        button:hover { background: #333; }
        .blocked { text-align: center; color: #e74c3c; display: none; }
    </style>
</head>
<body>

<div class="container" id="main-box">
    <h1>Tech Assessment Hub</h1>
    
    <div id="blocked-msg" class="blocked">
        <h2>⚠️ Acceso Denegado</h2>
        <p>Ya has realizado un intento de evaluación en este dispositivo.</p>
        <p style="color:#718096; font-size:0.9rem;">Si tuviste un problema técnico, por favor contacta a tu recruiter.</p>
    </div>

    <form id="startForm">
        <div class="form-group">
            <label for="nombre">Nombre y Apellido del Candidato</label>
            <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
        </div>
        
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required placeholder="juan.perez@email.com">
        </div>
        
        <div class="form-group">
            <label for="tech">Tecnología y Nivel a Evaluar</label>
            <select id="tech" required>
                <option value="">-- Selecciona una opción --</option>
                <option value="powerbi">Power BI / Data Analyst (Ssr)</option>
                <option value="java_jr">Java Developer (Junior)</option>
                <option value="java_ssr">Java Developer (Semi-Senior)</option>
                <option value="java_sr">Java Developer (Senior)</option>
                <option value="react_jr">React Developer (Junior)</option>
                <option value="react_ssr">React Developer (Semi-Senior)</option>
                <option value="react_sr">React Developer (Senior)</option>
                <option value="node_jr">Node.js Developer (Junior)</option>
                <option value="node_ssr">Node.js Developer (Semi-Senior)</option>
                <option value="node_sr">Node.js Developer (Senior)</option>
            </select>
        </div>
        
        <button type="button" onclick="irAlChallenge()">Comenzar Desafío</button>
    </form>
</div>

<script>
    // SISTEMA DE SEGURIDAD: Comprueba si ya se hizo un examen
    window.onload = function() {
        if (localStorage.getItem('test_realizado') === 'true') {
            document.getElementById('startForm').style.display = 'none';
            document.getElementById('blocked-msg').style.display = 'block';
        }
    }

    function irAlChallenge() {
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const tech = document.getElementById('tech').value;
        
        if(!nombre || !email || !tech) {
            alert("Por favor, completa todos los campos.");
            return;
        }
        
        localStorage.setItem('candidato_nombre', nombre);
        localStorage.setItem('candidato_email', email);
        
        if (tech.startsWith('java_') || tech.startsWith('react_') || tech.startsWith('node_')) {
            localStorage.setItem('nivel_elegido', tech);
            window.location.href = tech.split('_')[0] + ".html"; 
        } else if (tech === 'powerbi') {
            window.location.href = "powerbi.html";
        } else {
            alert("Esta batería de test está siendo configurada.");
        }
    }
</script>

</body>
</html>
