                { id: 8, p: "8. Al realizar profiling profundo de un modelo explicable utilizando valores SHAP (SHapley Additive exPlanations), ¿qué garantía teórica aporta este enfoque sobre los métodos tradicionales de Feature Importance integrados en los árboles de decisión?", a: "SHAP elimina la necesidad de realizar validaciones cruzadas durante las etapas de cross-validation.", b: "Aporta una distribución sólida basada en la teoría de juegos cooperativos que garantiza consistencia y aditividad local, desglosando la contribución exacta y marginal de cada variable específica de forma individual para una predicción concreta de manera equitativa.", c: "Asegura de forma irreversible que el modelo no sufra de fugas de memoria causadas por bucles infinitos de variables de entorno.", correct: "B" },
                { id: 9, p: "9. ¿Qué estrategia aplicarías para solucionar un problema severo de colinealidad (Multicollinearity) extrema detectado mediante un alto Factor de Inflación de la Varianza (VIF) en un modelo de regresión lineal explicativo empresarial?", a: "Ignorar las variables correlacionadas duplicando la cantidad de filas de entrenamiento físicas.", b: "Eliminar de forma selectiva las variables redundantes con mayor VIF, consolidar las características correlacionadas mediante técnicas de extracción como PCA, o aplicar algoritmos de regularización como ElasticNet para estabilizar y penalizar los coeficientes vinculados.", c: "Transformar la variable objetivo a formato de texto plano cifrado asincrónicamente.", correct: "B" },
                { id: 10, p: "10. ¿Cuál es el rol técnico estricto de la función de pérdida conocida como 'Cross-Entropy Loss' (Entropía Cruzada) en comparación con el Mean Squared Error (MSE) durante la optimización de problemas de clasificación multiclase?", a: "Cross-Entropy Loss se encarga de medir el error absoluto promedio en predicciones de series de tiempo financieras.", b: "Mide la divergencia de información entre la distribución de probabilidad de las clases predichas (pasadas por una capa Softmax) y las etiquetas reales en formato One-Hot, penalizando fuertemente y de forma logarítmica las predicciones incorrectas con alta confianza.", c: "Deshabilita de manera nativa los problemas de desvanecimiento del gradiente en capas convolucionales profundas.", correct: "B" },
                { id: 11, p: "11. En las arquitecturas de procesamiento de lenguaje natural (NLP) basadas en la arquitectura Transformer, ¿qué problema técnico resuelve el mecanismo de Atención Propia (Self-Attention) frente a las redes recurrentes?", a: "Elimina por completo el uso de memoria caché en los servidores de inferencia cloud nativos de la cuenta corporativa.", b: "Permite modelar las relaciones y dependencias contextuales entre todas las palabras de una secuencia de forma paralela y directa sin importar su distancia física, aumentando la paralelización frente al procesamiento lineal secuencial ineficiente de las RNNs.", c: "Habilita la compilación diferencial de modelos reduciendo el peso de los pesos de la red a cero.", correct: "B" },
                { id: 12, p: "12. ¿Cómo solucionás de forma limpia un problema de 'Target Leakage' (Fuga de Objetivo) detectado en un modelo predictivo que obtuvo métricas perfectas sospechosas en la fase de validación de laboratorio pero falla rotundamente al implementarse en producción?", a: "Forzando al algoritmo a ejecutarse de forma cíclica mediante código inline en el frontend cliente.", b: "Auditando rigurosamente el conjunto de características independientes para identificar y remover variables que contienen información del futuro o datos que se generan únicamente después de que el evento objetivo ya ha ocurrido en la realidad operativa.", c: "Reiniciando los pods de Kubernetes que alojan la API de inferencia ante cada predicción incorrecta.", correct: "B" },
                { id: 13, p: "13. ¿Qué rendimiento e interpretación tiene el uso del optimizador estocástico Adam (Adaptive Moment Estimation) frente al descenso de gradiente clásico con momento (SGD con Momento)?", a: "Adam aumenta la cantidad de llamadas API duplicadas al backend en la red de datos del orquestador distribuidos.", b: "Adam calcula tasas de aprendizaje adaptativas individuales para cada parámetro combinando las ventajas del promedio móvil del primer momento (gradientes) y del segundo momento (varianza sin centrar), acelerando la convergencia en superficies de pérdida complejas.", c: "Invalida de forma irreversible las políticas de seguridad de CORS en entornos de red.", correct: "B" },
                { id: 14, p: "14. Al implementar arquitecturas de Computer Vision utilizando Redes Neuronales Convolucionales (CNN), ¿cuál es el beneficio de ingeniería de aplicar capas de 'Max Pooling' intercaladas?", a: "Permitir que la red guarde registros locales en formato de base de datos relacional cifrada en disco.", b: "Reducir la dimensionalidad espacial de los mapas de características intermedios extraídos, disminuyendo drásticamente la cantidad de parámetros computacionales de la red, controlando el overfitting e inyectando invarianza a pequeñas traslaciones físicas.", c: "Optimizar el peso de renderizado de las imágenes vectoriales dinámicas en los visualizadores cliente.", correct: "B" },
                { id: 15, p: "15. ¿Cuál es el propósito avanzado de la métrica 'Adjusted R-Squared' (R-cuadrado ajustado) en comparación con el R-cuadrado convencional al evaluar modelos de regresión múltiple masivos?", a: "Reducir el tamaño de las bases de datos transaccionales de almacenamiento del servidor web.", b: "Penalizar de forma matemática la adición indiscriminada de variables independientes predictoras que no aportan valor explicativo real al modelo, evitando la falsa inflación artificial del indicador de bondad de ajuste.", c: "Encriptar las cookies de sesión del navegador ante el espionaje de red.", correct: "B" },
                { id: 16, p: "16. Trabajando con algoritmos no supervisados, ¿qué limitación busca resolver el uso del Coeficiente de Silueta (Silhouette Score) frente a la métrica de Inercia (Inertia / WCSS) al optimizar el hiperparámetro K en K-Means?", a: "La Inercia obliga al algoritmo a ejecutarse dentro de clústeres de integración continua en la nube de producción.", b: "La Inercia siempre disminuye de forma monótona a medida que se agregan más clústeres tendiendo a cero de forma ineficiente; el Coeficiente de Silueta evalúa la cohesión interna y la separación entre clústeres entregando una métrica normalizada entre -1 y 1.", c: "El Coeficiente de Silueta es el único compatible con motores de procesamiento asíncronos distribuidos.", correct: "B" },
                { id: 17, p: "17. Al configurar un modelo de recomendación basado en Filtrado Colaborativo (Collaborative Filtering), ¿cómo mitiga un Senior el problema técnico conocido como 'Cold Start' (Arranque en frío) para nuevos usuarios o ítems sin historial?", a: "Deshabilitando los filtros de análisis estático del pipeline de datos de forma temporal.", b: "Diseñando un sistema híbrido que combine el filtrado colaborativo con modelos basados en contenido (Content-Based) o variables demográficas heurísticas iniciales para predecir afinidades hasta acumular interacciones reales.", c: "Cifrando la matriz de factorización de datos mediante algoritmos simétricos.", correct: "B" },
                { id: 18, p: "18. ¿Cómo afecta el uso de una función de coste personalizada (Custom Loss Function) definida con penalizaciones asimétricas al comportamiento operativo de un modelo empresarial?", a: "Obliga a los programadores a reescribir las librerías de preprocesamiento de Scikit-Learn de forma estricta orientada a objetos.", b: "Permite alinear de forma matemática los objetivos del modelo con los costos financieros o riesgos reales del negocio (ej. penalizar 10 veces más un Falso Negativo que un Falso Positivo en detección de fraudes de alta criticidad).", c: "Deshabilita el procesamiento asíncrono distribuidos de los microservicios locales.", correct: "B" },
                { id: 19, p: "19. En el entrenamiento de modelos predictivos que manejan datos desbalanceados, ¿cuál es el impacto técnico de optimizar el modelo maximizando el área bajo la curva Precision-Recall (PR-AUC) frente a la curva clásica ROC-AUC?", a: "PR-AUC permite que las capas de presentación modifiquen los esquemas relacionales de las tablas productivas en tiempo de ejecución del script.", b: "PR-AUC es significativamente más informativa e indicativa en datasets severamente desbalanceados, ya que la curva PR se enfoca en la clase minoritaria y no se ve distorsionada de forma artificial por un número masivo de Verdaderos Negativos.", c: "ROC-AUC reduce la latencia de las transacciones financieras en canales electrónicos.", correct: "B" },
                { id: 20, p: "20. ¿Qué riesgo técnico previene la técnica de regularización conocida como 'Early Stopping' durante el entrenamiento iterativo de modelos de Deep Learning profundos?", a: "El desbordamiento físico del almacenamiento en disco del clúster de cómputo.", b: "Detiene de forma inteligente el proceso de entrenamiento en la época exacta donde el error medido sobre el conjunto de validación comienza a incrementarse de forma sostenida, previniendo el overfitting destructivo de la red neuronal.", c: "El parpadeo visual del lienzo físico de la interfaz gráfica del cliente remoto de inferencia.", correct: "B" }
            ]

    function getRandomQuestions(bank, count) {
        let shuffled = [...bank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    const currentLevel = localStorage.getItem('nivel_elegido') || 'datascience_jr';
    const examData = examDatabase[currentLevel];
    
    document.getElementById('exam-title').innerText = examData.title;
    const container = document.getElementById('questions-container');
    
    const selectedQuestions = getRandomQuestions(examData.questions, 10);
    
    selectedQuestions.forEach((item, index) => {
        const visualIndex = index + 1;
        const cleanText = item.p.replace(/^\d+\.\s*/, '');
        
        container.innerHTML += `
            <div class="question" data-id="${item.id}" data-correct="${item.correct}">
                <p>${visualIndex}. ${cleanText}</p>
                <label><input type="radio" name="q${item.id}" value="A"> A) ${item.a}</label>
                <label><input type="radio" name="q${item.id}" value="B"> B) ${item.b}</label>
                <label><input type="radio" name="q${item.id}" value="C"> C) ${item.c}</label>
            </div>
        `;
    });

    let timeLimit = 15 * 60;
    const timerDisplay = document.getElementById('time');
    const timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLimit / 60);
        let seconds = timeLimit % 60;
        timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLimit <= 0) { clearInterval(timerInterval); processAndSend(true); }
        timeLimit--;
    }, 1000);

    function processAndSend(isAuto) {
        clearInterval(timerInterval);
        let score = 0;
        let details = [];
        let unanswered = false;

        selectedQuestions.forEach((item) => {
            const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
            if (!selected && !isAuto) { unanswered = true; }
            
            let val = selected ? selected.value : "X";
            details.push(`PreguntaID_${item.id}:${val}`);
            if (val === item.correct) score++;
        });

        if (unanswered && !isAuto) { 
            alert("Por favor responde todas las preguntas antes de finalizar."); 
            return; 
        }

        let seniority = "Junior (Jr)";
        if (score >= 9) seniority = "Senior (Sr)";
        else if (score >= 6) seniority = "Semi-Senior (Ssr)";

        localStorage.setItem('test_realizado', 'true');

        document.getElementById('form_nombre').value = localStorage.getItem('candidato_nombre');
        document.getElementById('form_email').value = localStorage.getItem('candidato_email');
        document.getElementById('form_tech').value = examData.title;
        document.getElementById('form_score').value = `${score} / 10`;
        document.getElementById('form_seniority').value = seniority;
        document.getElementById('form_details').value = details.join(", ");
        document.getElementById('form_reclutadora').value = localStorage.getItem('reclutadora_asignada');

        document.getElementById('timer-sticky').style.display = "none";
        document.getElementById('main-container').style.display = "none";
        document.getElementById('thanks-box').style.display = "block";

        document.getElementById('hiddenRecruiterForm').submit();
    }
</script>
