                { id: 9, p: "9. Al realizar profiling profundo de una app React con la pestaña 'Profiler' de React Developer Tools, ¿qué indicador técnico define la existencia de 'Commit Phase Bloat' y cómo lo solucionas?", a: "Que la aplicación tarda demasiado tiempo descargando dependencias pesadas desde el gestor NPM en la red.", b: "Que la fase de commit (donde React aplica los cambios físicos al DOM real) es muy lenta debido a la ejecución síncrona de lógica pesada dentro de useLayoutEffect o efectos colaterales; se soluciona derivando esas tareas a microtareas asíncronas de background.", c: "Un error de desbordamiento de pila al usar librerías de estilos dinámicos CSS-in-JS de manera anidada.", correct: "B" },
                { id: 10, p: "10. ¿Cuál es el rol técnico estricto de la función 'createSelector' de la librería Reselect al optimizar el consumo de stores complejos y centralizados en arquitecturas empresariales?", a: "Modificar de forma asíncrona las propiedades mutables globales del Store central.", b: "Construir selectores con capacidad de memoización avanzada, garantizando que la porción de estado derivada no se vuelva a calcular ni dispare re-renders en los componentes a menos que sus argumentos de entrada específicos hayan cambiado de referencia real.", c: "Interceptar los errores de red 401 y redirigir el flujo al portal de login corporativo.", correct: "B" },
                { id: 11, p: "11. En arquitecturas modernas basadas en Next.js (App Router), ¿qué ventaja conceptual aporta la combinación de Incremental Static Regeneration (ISR) con Server Actions?", a: "Elimina por completo el uso de memoria caché en los servidores Cloud nativos.", b: "Permite regenerar de forma estática páginas individuales en segundo plano tras un intervalo configurado, mientras que las Server Actions simplifican las mutaciones de datos directas invocando código del servidor de forma segura sin APIs manuales.", c: "Habilita la compilación diferencial políglota nativa eliminando los archivos TypeScript.", correct: "B" },
                { id: 12, p: "12. ¿Cómo solucionás de forma limpia una fuga de memoria (Memory Leak) compleja provocada por el uso de WebSockets o EventSources dentro de un custom hook de subscripción continua?", a: "Forzando al Garbage Collector a ejecutarse de forma cíclica mediante código de JavaScript inline en la vista.", b: "Asegurando el retorno de una función de limpieza (cleanup function) rigurosa en el useEffect interno que cierre explícitamente la conexión del socket, remueva los listeners asociados y libere las referencias de memoria retenidas.", c: "Reiniciando el pod de Kubernetes que sirve la aplicación web de producción ante cada desconexión.", correct: "B" },
                { id: 13, p: "13. ¿Qué implicancia de rendimiento tiene el uso masivo e indiscriminado de bibliotecas de CSS-in-JS tradicionales (como Styled Components o Emotion) que generan estilos dinámicos en tiempo de ejecución en apps masivas?", a: "Aumenta la cantidad de llamadas API duplicadas al backend en la red de datos.", b: "Suma una sobrecarga considerable en la CPU del cliente debido a que el framework debe calcular, parsear e inyectar etiquetas de estilos en el DOM en cada render, degradando las métricas de Core Web Vitals (como el Interaction to Next Paint).", c: "Invalida de forma irreversible las políticas de seguridad de CORS en entornos en la nube.", correct: "B" },
                { id: 14, p: "14. Al implementar State Machines (Máquinas de Estado) mediante herramientas como XState en el frontend de aplicaciones complejas, ¿qué beneficio de ingeniería se persigue?", a: "Permitir que el frontend guarde registros relacionales locales en formato de base de datos relacional cifrada.", b: "Eliminar el código imperativo impredecible gobernado por infinitas variables booleanas (isLoading, isError, hasLoaded), modelando los flujos lógicos mediante estados deterministas cerrados y transiciones explícitas e inmutables.", c: "Optimizar el peso de renderizado de las imágenes vectoriales dinámicas cargadas en segundo plano.", correct: "B" },
                { id: 15, p: "15. ¿Cuál es el propósito avanzado de la directiva 'useActivity' o de los mecanismos de hidratación progresiva (Partial Hydration) en arquitecturas modernas nativas de frontend?", a: "Reducir el tamaño de las bases de datos transaccionales del servidor web.", b: "Permitir descargar el código HTML estático inicial de manera inmediata e ir hidratando e inyectando interactividad únicamente a los componentes que entran en la zona visible o interacción del usuario, reduciendo drásticamente el Time to Interactive.", c: "Encriptar las cookies de sesión del navegador ante el espionaje de red.", correct: "B" },
                { id: 16, p: "16. Trabajando con pruebas automáticas, ¿por qué la combinación de React Testing Library junto con Mock Service Worker (MSW) es la mejor práctica técnica para testear flujos de red de componentes de alto rendimiento?", a: "Porque MSW compila el código del frontend en un entorno real de simulación de hardware.", b: "Porque permite testear el comportamiento del componente simulando la interacción real del usuario sobre el DOM sin mockear los métodos internos de la app, mientras MSW intercepta las llamadas de red reales a nivel de red nativa sin alterar los clientes HTTP.", c: "Porque elimina la necesidad de correr los tests dentro de clústeres de integración continua.", correct: "B" },

                { id: 18, p: "18. ¿Cómo afecta la configuración de la directiva 'compiler options' de React 19 (React Compiler / Project Forget) al flujo de desarrollo y optimización de código?", a: "Obliga a los programadores a escribir componentes basados en clases abstractas orientadas a objetos de forma estricta.", b: "Automatiza por completo la optimización del código, encargándose de la memorización de componentes, funciones y cálculos avanzados de forma interna sin requerir el uso manual de useMemo y useCallback por parte del desarrollador.", c: "Deshabilita el procesamiento asíncrono de los microfrontends locales.", correct: "B" },

                { id: 20, p: "20. ¿Qué métrica técnica de performance se ve directamente afectada de forma negativa si un componente React ejecuta ciclos masivos de re-renderizado involuntarios gatillados por la mutación constante de referencias de objetos en el store?", a: "Largest Contentful Paint (LCP) exclusivamente en redes móviles antiguas.", b: "Interaction to Next Paint (INP), ya que la CPU del cliente permanece saturada procesando tareas pesadas de reconciliación de DOM virtual en el hilo principal, bloqueando la respuesta inmediata ante interacciones de usuario.", c: "El tamaño del archivo bundle estático final compilado en producción.", correct: "B" }
            ]
        }
    };

    function getRandomQuestions(bank, count) {
        let shuffled = [...bank];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled.slice(0, count);
    }

    const currentLevel = localStorage.getItem('nivel_elegido') || 'react_jr';
    const examData = examDatabase[currentLevel];
    
    document.getElementById('exam-title').innerText = examData.title;
    const container = document.getElementById('questions-container');
    
    const selectedQuestions = getRandomQuestions(examData.questions, 10);
    
    selectedQuestions.forEach((item, index) => {
        const visualIndex = index + 1;
        const cleanText = item.p.replace(/^\d+\.\s*/, '');
        
        container.innerHTML += `
            <div class="question" data-id="${item.id}" data-correct="${item.correct}">
                <p>${visualIndex}. ${cleanText}</p>
                <label><input type="radio" name="q${item.id}" value="A"> A) ${item.a}</label>
                <label><input type="radio" name="q${item.id}" value="B"> B) ${item.b}</label>
                <label><input type="radio" name="q${item.id}" value="C"> C) ${item.c}</label>
            </div>
        `;
    });

    let timeLimit = 15 * 60;
    const timerDisplay = document.getElementById('time');
    const timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLimit / 60);
        let seconds = timeLimit % 60;
        timerDisplay.innerText = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLimit <= 0) { clearInterval(timerInterval); processAndSend(true); }
        timeLimit--;
    }, 1000);

    function processAndSend(isAuto) {
        clearInterval(timerInterval);
        let score = 0;
        let details = [];
        let unanswered = false;

        selectedQuestions.forEach((item) => {
            const selected = document.querySelector(`input[name="q${item.id}"]:checked`);
            if (!selected && !isAuto) { unanswered = true; }
            
            let val = selected ? selected.value : "X";
            details.push(`PreguntaID_${item.id}:${val}`);
            if (val === item.correct) score++;
        });

        if (unanswered && !isAuto) { 
            alert("Por favor responde todas las preguntas antes de finalizar."); 
            return; 
        }

        let seniority = "Junior (Jr)";
        if (score >= 9) seniority = "Senior (Sr)";
        else if (score >= 6) seniority = "Semi-Senior (Ssr)";

        localStorage.setItem('test_realizado', 'true');

        document.getElementById('form_nombre').value = localStorage.getItem('candidato_nombre');
        document.getElementById('form_email').value = localStorage.getItem('candidato_email');
        document.getElementById('form_tech').value = examData.title;
        document.getElementById('form_score').value = `${score} / 10`;
        document.getElementById('form_seniority').value = seniority;
        document.getElementById('form_details').value = details.join(", ");
document.getElementById('form_reclutadora').value = localStorage.getItem('reclutadora_asignada');
        
        document.getElementById('timer-sticky').style.display = "none";
        document.getElementById('main-container').style.display = "none";
        document.getElementById('thanks-box').style.display = "block";

        document.getElementById('hiddenRecruiterForm').submit();
    }
</script>
